groups:
  # ==============================================
  # ALERTAS DE MYSQL
  # ==============================================
  - name: mysql_alerts
    interval: 30s
    rules:
      - alert: MySQLDown
        expr: mysql_up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "MySQL instance {{ $labels.instance }} is down"
          description: "MySQL has been down for more than 1 minute"

      - alert: MySQLReplicationNotRunning
        expr: mysql_slave_status_slave_io_running == 0 or mysql_slave_status_slave_sql_running == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "MySQL replication is not running"
          description: "Replication IO or SQL thread is stopped"

      - alert: MySQLReplicationLag
        expr: mysql_slave_status_seconds_behind_master > 10
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "MySQL replication lag is high"
          description: "Replication lag is {{ $value }} seconds"

      - alert: MySQLHighConnections
        expr: mysql_global_status_threads_connected > 100
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High number of connections"
          description: "Connections: {{ $value }}"

      - alert: MySQLSlowQueries
        expr: rate(mysql_global_status_slow_queries[5m]) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High number of slow queries"
          description: "Slow queries per second: {{ $value }}"

  # ==============================================
  # ALERTAS DE APACHE / WEB SERVER
  # ==============================================
  - name: apache_alerts
    interval: 30s
    rules:
      - alert: ApacheDown
        expr: apache_up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Apache web server is down"
          description: "Apache has been down for more than 1 minute"

      - alert: ApacheHighCPULoad
        expr: apache_cpuload > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Apache CPU load is high"
          description: "Apache CPU load is {{ $value }}%"

      - alert: ApacheHighTraffic
        expr: rate(apache_sent_kilobytes_total[5m]) > 5000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High outbound traffic on Apache"
          description: "Traffic is {{ $value }} KB/s"

      - alert: ApacheHighRequests
        expr: rate(apache_accesses_total[5m]) > 100
        for: 5m
        labels:
          severity: warning
          annotations:
          summary: "High number of requests per second"
          description: "Requests per second: {{ $value }}"

  # ==============================================
  # ALERTAS DE SISTEMA (CPU, MEMORIA, DISCO)
  # ==============================================
  - name: system_alerts
    interval: 30s
    rules:
      # Backup Server alerts
      - alert: BackupServerDown
        expr: up{job="node-backup"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Backup server is down"
          description: "Node exporter is not responding"

      - alert: HighCPUUsage_Backup
        expr: 100 - (avg by (instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage on backup server"
          description: "CPU usage is {{ $value }}%"

      - alert: HighMemoryUsage_Backup
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 90
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage on backup server"
          description: "Memory usage is {{ $value }}%"

      - alert: LowDiskSpace_Backup
        expr: (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) * 100 < 10
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Low disk space on backup server"
          description: "Less than 10% disk space remaining"

      - alert: DiskWillFillIn24h_Backup
        expr: predict_linear(node_filesystem_free_bytes{mountpoint="/"}[1h], 24*3600) < 0
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "Disk will fill in less than 24 hours"
          description: "Based on current filling rate"

  # ==============================================
  # ALERTAS DE RESPALDOS
  # ==============================================
  - name: backup_alerts
    interval: 5m
    rules:
      - alert: BackupNotPerformed
        expr: (time() - backup_last_timestamp_seconds) > 86400
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Backup not performed in last 24 hours"
          description: "No successful backup in the last 24 hours"

      - alert: BackupSizeTooSmall
        expr: backup_mysql_size_bytes < 100000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Backup size is suspiciously small"
          description: "MySQL backup size is {{ $value }} bytes"

      - alert: NoBackups
        expr: backup_total_count == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "No backups found"
          description: "No backups have been created yet"

  # ==============================================
  # ALERTAS DE CONTENEDORES
  # ==============================================
  - name: container_alerts
    interval: 30s
    rules:
      - alert: ContainerDown
        expr: container_last_seen{name=~".+"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Container {{ $labels.name }} is down"

      - alert: ContainerRestarting
        expr: rate(container_last_seen[5m]) > 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Container {{ $labels.name }} is restarting frequently"
          description: "Container has restarted in the last 5 minutes"