groups:
  # ==============================================
  # ALERTAS DE MYSQL
  # ==============================================
  - name: mysql_alerts
    interval: 30s
    rules:
      - alert: MySQLCaido
        expr: mysql_up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "La instancia MySQL {{ $labels.instance }} está caída"
          description: "MySQL ha estado caído por más de 1 minuto"

      - alert: ReplicacionMySQLNoActiva
        expr: mysql_slave_status_slave_io_running == 0 or mysql_slave_status_slave_sql_running == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "La replicación de MySQL no está activa"
          description: "El hilo IO o SQL de replicación está detenido"

      - alert: RetrasoReplicacionMySQL
        expr: mysql_slave_status_seconds_behind_master > 10
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "El retraso de replicación de MySQL es alto"
          description: "El retraso de replicación es de {{ $value }} segundos"

      - alert: AltoNumeroConexionesMySQL
        expr: mysql_global_status_threads_connected > 100
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Alto número de conexiones"
          description: "Conexiones: {{ $value }}"

      - alert: ConsultasLentasMySQL
        expr: rate(mysql_global_status_slow_queries[5m]) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Alto número de consultas lentas"
          description: "Consultas lentas por segundo: {{ $value }}"

  # ==============================================
  # ALERTAS DE APACHE / SERVIDOR WEB
  # ==============================================
  - name: apache_alerts
    interval: 30s
    rules:
      - alert: ApacheCaido
        expr: apache_up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "El servidor web Apache está caído"
          description: "Apache ha estado caído por más de 1 minuto"

      - alert: AltoUsoCPUApache
        expr: apache_cpuload > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "El uso de CPU de Apache es alto"
          description: "El uso de CPU de Apache es del {{ $value }}%"

      - alert: AltoTraficoApache
        expr: rate(apache_sent_kilobytes_total[5m]) > 5000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Tráfico saliente alto en Apache"
          description: "El tráfico es de {{ $value }} KB/s"

      - alert: AltoNumeroPeticionesApache
        expr: rate(apache_accesses_total[5m]) > 100
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Alto número de peticiones por segundo"
          description: "Peticiones por segundo: {{ $value }}"

  # ==============================================
  # ALERTAS DE SISTEMA (CPU, MEMORIA, DISCO)
  # ==============================================
  - name: system_alerts
    interval: 30s
    rules:
      # Alertas del servidor de respaldos
      - alert: ServidorRespaldosCaido
        expr: up{job="node-backup"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "El servidor de respaldos está caído"
          description: "El exportador de nodos no está respondiendo"

      - alert: AltoUsoCPU_Respaldos
        expr: 100 - (avg by (instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Alto uso de CPU en el servidor de respaldos"
          description: "El uso de CPU es del {{ $value }}%"

      - alert: AltoUsoMemoria_Respaldos
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 90
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Alto uso de memoria en el servidor de respaldos"
          description: "El uso de memoria es del {{ $value }}%"

      - alert: EspacioDiscoBajo_Respaldos
        expr: (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) * 100 < 10
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Espacio de disco bajo en el servidor de respaldos"
          description: "Queda menos del 10% de espacio en disco"

      - alert: DiscoSeLlenara24h_Respaldos
        expr: predict_linear(node_filesystem_free_bytes{mountpoint="/"}[1h], 24*3600) < 0
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "El disco se llenará en menos de 24 horas"
          description: "Basado en la tasa actual de llenado"

  # ==============================================
  # ALERTAS DE RESPALDOS
  # ==============================================
  - name: backup_alerts
    interval: 5m
    rules:
      - alert: RespaldoNoRealizado
        expr: (time() - backup_last_timestamp_seconds) > 86400
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "No se ha realizado un respaldo en las últimas 24 horas"
          description: "No hay respaldos exitosos en las últimas 24 horas"

      - alert: TamanoRespaldoMuyPequeno
        expr: backup_mysql_size_bytes < 100000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "El tamaño del respaldo es sospechosamente pequeño"
          description: "El tamaño del respaldo MySQL es de {{ $value }} bytes"

      - alert: NoHayRespaldos
        expr: backup_total_count == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "No se encontraron respaldos"
          description: "Aún no se ha creado ningún respaldo"

  # ==============================================
  # ALERTAS DE CONTENEDORES
  # ==============================================
  - name: container_alerts
    interval: 30s
    rules:
      - alert: ContenedorCaido
        expr: container_last_seen{name=~".+"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "El contenedor {{ $labels.name }} está caído"

      - alert: ContenedorReiniciando
        expr: rate(container_last_seen[5m]) > 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "El contenedor {{ $labels.name }} se está reiniciando frecuentemente"
          description: "El contenedor se ha reiniciado en los últimos 5 minutos"